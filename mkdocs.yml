site_name: viur-testing
site_description: ViUR core extension (stub) — purpose TBD.
site_url: https://sprengplatz.github.io/viur-testing/
repo_url: https://github.com/sprengplatz/viur-testing
repo_name: sprengplatz/viur-testing
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    # navigation.instant is intentionally disabled: it is incompatible
    # with the mkdocs-static-i18n language switcher contextual link.
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Development Mode: dev-mirror-mode.md
  - Guarded Mode: guarded-mode.md
  - ViUR3 Monkey Patches: viur3-patches.md
  # API reference is generated from the (English) Python docstrings and
  # exists only once. In the German build the de/api/* pages are tiny
  # redirect stubs that bounce straight to the English page — so a German
  # reader lands directly on the English API reference, and we avoid
  # rendering mkdocstrings twice (which would create clashing anchors).
  - API reference:
      - Host API: api/host.md
      - Runner API: api/runner.md
      - TestModule: api/test.md
      - ConfigModule: api/config.md
      - Validators: api/validator.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - "."
        - "docs"
      check_paths: true
  - toc:
      permalink: true

plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: de
          name: Deutsch
          build: true
          nav_translations:
            Home: Start
            Getting started: Erste Schritte
            Development Mode: Development-Modus
            Guarded Mode: Guarded-Modus
            ViUR3 Monkey Patches: ViUR3 Monkey-Patches
            API reference: API-Referenz
            Host API: Host-API
            Runner API: Runner-API
            Validators: Validatoren
            Changelog: Änderungshistorie
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: sphinx
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            heading_level: 2
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sprengplatz/viur-testing
    - icon: fontawesome/solid/globe
      link: https://www.viur.dev/
