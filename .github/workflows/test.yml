name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (skip viur-core runtime dep — mocked by viur-light-mock)
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-deps -e .
          # Pull only the test extras (pytest, pytest-cov, viur-light-mock).
          # ``viur-light-mock`` provides the viur.core stand-ins via its
          # pytest11 entry-point, so the real viur-core is never needed.
          python -m pip install pytest pytest-cov 'coverage[toml]' viur-light-mock

      - name: Run tests
        run: pytest

      - name: Upload coverage HTML
        if: matrix.python == '3.13' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          if-no-files-found: ignore
